<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adult Coaching Notes Generator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  padding: 30px;
  margin: 0;
  color: #1f2937;
}

.site-logo {
  display: block;
  margin: 20px auto;
  max-width: 420px;
}

.container {
  max-width: 1150px;
  margin: auto;
  background: white;
  padding: 28px;
  border-radius: 14px;
  box-shadow: 0 0 12px rgba(0,0,0,.10);
}

h1 {
  margin-top: 0;
  color: #124734;
}

.layout {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 28px;
}

.form-section,
.output-section {
  background: #f9fbff;
  border: 1px solid #dbe7ff;
  border-radius: 14px;
  padding: 20px;
}

label {
  display: block;
  margin-top: 12px;
  font-weight: 700;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
}

textarea {
  min-height: 90px;
}

.button-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 18px;
}

button {
  border: none;
  padding: 12px;
  border-radius: 8px;
  color: white;
  font-weight: 700;
  cursor: pointer;
}

.copy-btn { background: #0f766e; }
.clear-btn { background: #dc2626; }
.print-btn { background: #64748b; }

.bluebox {
  background: #dbe8f7;
  padding: 20px;
  border-radius: 10px;
  white-space: pre-wrap;
  min-height: 650px;
}

.holland-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 8px;
}

.holland-btn {
  position: relative;
  background: #ffffff;
  color: #1f2937;
  border: 2px solid #94a3b8;
  border-radius: 8px;
  padding: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
}

.holland-btn:hover {
  background: #e0f2fe;
  border-color: #3b82f6;
}

.holland-btn.selected {
  background: #2563eb;
  color: white;
  border-color: #1d4ed8;
}

.rank {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #1d4ed8;
  color: white;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 999px;
  opacity: 0;
  transform: scale(0.5);
}

.rank.show {
  animation: pop 0.25s ease forwards;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.selected-codes-box {
  margin-top: 10px;
  padding: 10px;
  background: #f8fafc;
  border-radius: 8px;
}

.phase-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 8px;
}

.phase-btn {
  background: #ffffff;
  color: #1f2937;
  border: 2px solid #94a3b8;
  border-radius: 8px;
  padding: 12px;
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  transition: 0.2s ease;
}

.phase-btn:hover {
  background: #e0f2fe;
  border-color: #3b82f6;
}

.phase-btn.selected {
  background: #2563eb;
  color: white;
  border-color: #1d4ed8;
}

.phase-description {
  margin-top: 8px;
  padding: 10px 12px;
  background: #f8fafc;
  border: 1px solid #dbe7ff;
  border-radius: 8px;
  color: #475569;
  line-height: 1.5;
}
</style>
</head>

<body>

<img src="logo.png" class="site-logo" alt="Logo">

<div class="container">
  <h1>Adult Coaching Notes Generator</h1>

  <div class="layout">

    <div class="form-section">

      <label>* Top Career #1</label>
      <input id="career1" oninput="generate()" />

      <label>* Top Career #2</label>
      <input id="career2" oninput="generate()" />

      <label>* Top Career #3</label>
      <input id="career3" oninput="generate()" />

      <label>Phase</label>
      <div class="phase-grid">
        <button type="button" class="phase-btn" data-phase="Discovery" onclick="selectPhase(this)">
          Discovery
        </button>
        <button type="button" class="phase-btn" data-phase="Engagement" onclick="selectPhase(this)">
          Engagement
        </button>
      </div>

      <div class="phase-description">
        <strong>Discovery:</strong> The individual is still exploring potential career interests and identifying what they would like to pursue.<br><br>
        <strong>Engagement:</strong> The individual is seeking opportunities to engage, gain exposure, and learn more about career options.
      </div>

      <input id="phase" type="hidden" />

      <label>Top 3 Holland Codes</label>

      <div class="holland-grid">
        <button type="button" class="holland-btn" data-code="Realistic" onclick="toggleHolland(this)">
          <span class="rank"></span>Realistic
        </button>

        <button type="button" class="holland-btn" data-code="Investigative" onclick="toggleHolland(this)">
          <span class="rank"></span>Investigative
        </button>

        <button type="button" class="holland-btn" data-code="Artistic" onclick="toggleHolland(this)">
          <span class="rank"></span>Artistic
        </button>

        <button type="button" class="holland-btn" data-code="Social" onclick="toggleHolland(this)">
          <span class="rank"></span>Social
        </button>

        <button type="button" class="holland-btn" data-code="Enterprising" onclick="toggleHolland(this)">
          <span class="rank"></span>Enterprising
        </button>

        <button type="button" class="holland-btn" data-code="Conventional" onclick="toggleHolland(this)">
          <span class="rank"></span>Conventional
        </button>
      </div>

      <div class="selected-codes-box" id="selectedCodesDisplay">No Holland Codes selected yet.</div>

      <label>Interests</label>
      <textarea id="interests" oninput="generate()"></textarea>

      <label>Resources</label>
      <textarea id="resources" oninput="generate()"></textarea>

      <label>* Next Steps</label>
      <textarea id="next" oninput="generate()"></textarea>

      <label>* Summary</label>
      <textarea id="summary" oninput="generate()"></textarea>

      <div class="button-row">
        <button type="button" class="copy-btn" onclick="copyText()">Copy</button>
        <button type="button" class="clear-btn" onclick="clearForm()">Clear</button>
        <button type="button" class="print-btn" onclick="window.print()">Print</button>
      </div>

    </div>

    <div class="output-section">
      <div class="bluebox" id="output"></div>
    </div>

  </div>
</div>

<script>
let selectedHollandCodes = [];
let selectedPhase = "";

function selectPhase(button) {
  const phase = button.dataset.phase;

  if (selectedPhase === phase) {
    selectedPhase = "";
    document.getElementById("phase").value = "";
    button.classList.remove("selected");
  } else {
    selectedPhase = phase;
    document.getElementById("phase").value = phase;

    document.querySelectorAll(".phase-btn").forEach(btn => {
      btn.classList.remove("selected");
    });

    button.classList.add("selected");
  }

  generate();
}

function toggleHolland(button) {
  const code = button.dataset.code;

  if (selectedHollandCodes.includes(code)) {
    selectedHollandCodes = selectedHollandCodes.filter(c => c !== code);
    button.classList.remove("selected");
  } else {
    if (selectedHollandCodes.length >= 3) return;
    selectedHollandCodes.push(code);
    button.classList.add("selected");
  }

  updateRanks();
  generate();
}

function updateRanks() {
  document.querySelectorAll(".holland-btn").forEach(btn => {
    const code = btn.dataset.code;
    const rankEl = btn.querySelector(".rank");
    const index = selectedHollandCodes.indexOf(code);

    if (index >= 0) {
      rankEl.textContent = `#${index + 1}`;
      rankEl.classList.remove("show");
      void rankEl.offsetWidth;
      rankEl.classList.add("show");
    } else {
      rankEl.textContent = "";
      rankEl.classList.remove("show");
    }
  });

  document.getElementById("selectedCodesDisplay").textContent =
    selectedHollandCodes.length
      ? selectedHollandCodes.map((c, i) => `${i + 1}. ${c}`).join(" | ")
      : "No Holland Codes selected yet.";
}

function generate() {
  const holland = selectedHollandCodes.length
    ? selectedHollandCodes.map((c, i) => `${i + 1}. ${c}`).join("\n")
    : "";

  let result = `Top 3 Careers:
1. ${career1.value}
2. ${career2.value}
3. ${career3.value}`;

  result += build("Phase", phase.value);
  result += build("Top 3 Holland Codes", holland);
  result += build("Interests", interests.value);
  result += build("Resources", resources.value);
  result += build("Next Steps *", next.value);
  result += build("Summary *", summary.value);

  output.innerText = result;
}

function build(title, val) {
  return val.trim() ? `\n\n${title}:\n${val}` : "";
}

function copyText() {
  navigator.clipboard.writeText(output.innerText);
  alert("Copied!");
}

function clearForm() {
  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
  selectedHollandCodes = [];
  selectedPhase = "";

  document.querySelectorAll(".holland-btn").forEach(btn => btn.classList.remove("selected"));
  document.querySelectorAll(".phase-btn").forEach(btn => btn.classList.remove("selected"));

  updateRanks();
  generate();
}

generate();
</script>

</body>
</html>
